<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Profiles — Profile Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <nav class="topnav">
      <a href="index.html" class="nav-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Home
      </a>
      <span class="nav-title">All Profiles</span>
      <a href="new-profile.html" class="btn btn-sm btn-primary" style="margin-left:auto;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        New
      </a>
    </nav>

    <div id="stats-bar" class="stats-bar hidden">
      <div class="stat-chip" id="total-count">0 profiles</div>
    </div>

    <div id="search-wrap" class="search-wrap hidden">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="search-icon"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search by name or ID…" oninput="renderProfiles()" />
    </div>

    <div id="profiles-grid" class="profiles-grid"></div>

    <div id="empty-state" class="empty-state hidden">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="20" r="8" stroke="currentColor" stroke-width="2" opacity="0.3"/><path d="M8 40c0-8.837 7.163-16 16-16s16 7.163 16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/></svg>
      <p>No profiles yet.</p>
      <a href="new-profile.html" class="btn btn-primary">Create your first profile</a>
    </div>
  </div>

  <script src="profiles.js"></script>
  <script>
    function getAge(birthday) {
      const today = new Date();
      const birth = new Date(birthday);
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return age;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    const COLORS = ['c-blue','c-teal','c-purple','c-coral','c-pink','c-amber','c-green'];
    function colorForId(id) {
      return COLORS[parseInt(id, 10) % COLORS.length];
    }

    function renderProfiles() {
      const profiles = loadProfiles();
      const query = (document.getElementById('search-input')?.value || '').toLowerCase();
      const filtered = profiles.filter(p =>
        p.name.toLowerCase().includes(query) || p.id.includes(query)
      );

      const grid = document.getElementById('profiles-grid');
      const empty = document.getElementById('empty-state');
      const statsBar = document.getElementById('stats-bar');
      const searchWrap = document.getElementById('search-wrap');

      document.getElementById('total-count').textContent =
        profiles.length + (profiles.length === 1 ? ' profile' : ' profiles');

      if (profiles.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        statsBar.classList.add('hidden');
        searchWrap.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');
      statsBar.classList.remove('hidden');
      searchWrap.classList.remove('hidden');

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="no-results">No profiles match your search.</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const color = colorForId(p.id);
        const age = getAge(p.birthday);
        const created = new Date(p.created).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        return
          <div class="profile-card">
            <div class="profile-card-header">
              <div class="avatar avatar-${color}">${initials(p.name)}</div>
              <div class="profile-card-info">
                <div class="profile-name">${p.name}</div>
                <div class="profile-id">#${p.id}</div>
              </div>
            </div>
            <div class="profile-card-body">
              <div class="profile-row">
                <span class="profile-label">Birthday</span>
                <span class="profile-value">${formatDate(p.birthday)}</span>
              </div>
              <div class="profile-row">
                <span class="profile-label">Age</span>
                <span class="profile-value">${age} years old</span>
              </div>
              <div class="profile-row">
                <span class="profile-label">Created</span>
                <span class="profile-value">${created}</span>
              </div>
              <div class="profile-row">
                <span class="profile-label">JSON file</span>
                <span class="profile-value mono">PROFILE_${p.id}.json</span>
              </div>
            </div>
          </div>;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', renderProfiles);
  </script>
</body>
</html>
